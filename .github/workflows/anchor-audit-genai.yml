# GitHub Actions Workflow for Anchor-Audit with GenAI Integration
# Enforces risks identified in threat_model.md

name: Anchor AI Governance Check (GenAI)

on:
  pull_request:
    branches: [main, develop, master]

jobs:
  anchor-audit-genai:
    runs-on: ubuntu-latest
    name: Enforce Anchor-Identified Risks
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Anchor-Audit
        run: |
          pip install .

      - name: Seed Governance Cache
        run: |
          mkdir -p .anchor/cache
          cp constitution.anchor .anchor/cache/constitution.anchor
          cp mitigation.anchor .anchor/cache/mitigation.anchor

      - name: Check if Threat Model Exists
        id: check_threat_model
        run: |
          if [ -f "threat_model.md" ]; then
            echo "has_threat_model=true" >> $GITHUB_OUTPUT
          else
            echo "has_threat_model=false" >> $GITHUB_OUTPUT
          fi

      - name: Run GenAI Governance Check
        if: steps.check_threat_model.outputs.has_threat_model == 'true'
        run: |
          python -m anchor check --context threat_model.md --dir anchor/ --exclude examples --exclude tests --exclude scripts --exclude case-studies --exclude docs --exclude patterns --exclude demo --verbose

      - name: Run Standard Governance Check
        if: steps.check_threat_model.outputs.has_threat_model == 'false'
        run: |
          python -m anchor check --dir anchor/ --exclude examples --exclude tests --exclude scripts --exclude case-studies --exclude docs --exclude patterns --exclude demo --verbose

      - name: Comment on PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Anchor AI Governance Check Failed\n\nYour code violates FINOS security policies. Please review the violations and update your code.\n\nRun `anchor check --dir .` locally to see details.'
            })
