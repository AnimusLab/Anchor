# GitHub Actions Workflow for Anchor-Audit with GenAI Integration
# Enforces risks identified in threat_model.md

name: Anchor AI Governance Check (GenAI)

on:
  pull_request:
    branches: [main, develop, master]

jobs:
  anchor-audit-genai:
    runs-on: ubuntu-latest
    name: Enforce Anchor-Identified Risks
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Anchor-Audit
        run: |
          pip install .

      - name: Check if Threat Model Exists
        id: check_threat_model
        run: |
          if [ -f "threat_model.md" ]; then
            echo "has_threat_model=true" >> $GITHUB_OUTPUT
          else
            echo "has_threat_model=false" >> $GITHUB_OUTPUT
          fi

      - name: Run GenAI Governance Check
        if: steps.check_threat_model.outputs.has_threat_model == 'true'
        run: |
          python -m anchor check . --context threat_model.md --exclude tests --exclude scripts --exclude docs --exclude demo --verbose

      - name: Run Standard Governance Check
        if: steps.check_threat_model.outputs.has_threat_model == 'false'
        run: |
          python -m anchor check . --exclude tests --exclude scripts --exclude docs --exclude demo --verbose

      - name: Generate Step Summary
        if: always()
        run: |
          if [ -f .anchor/reports/governance_audit.md ]; then
            cat .anchor/reports/governance_audit.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Audit Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: anchor-audit-reports
          path: |
            .anchor/telemetry/governance_report.json
            .anchor/violations/governance_violations.txt
            .anchor/reports/governance_audit.md

      - name: Comment on PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = '.anchor/reports/governance_audit.md';
            let body = '### Anchor AI Governance Check Failed (GenAI Mode)\n\nYour code violates security policies identified in the threat model or standard catalog. Please review the findings below.\n\n';

            if (fs.existsSync(reportPath)) {
              const reportContent = fs.readFileSync(reportPath, 'utf8');
              body += reportContent;
            } else {
              body += 'Detailed report not found. Run `anchor check` locally to debug.';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })
