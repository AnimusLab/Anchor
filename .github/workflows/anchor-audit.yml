# GitHub Actions Workflow for Anchor-Audit
# Enforces FINOS AI Governance policies on every pull request

name: Anchor AI Governance Check

on:
  pull_request:
    branches: [main, develop, master] # Works with any branch name
  push:
    branches: [main, master]

jobs:
  anchor-audit:
    runs-on: ubuntu-latest
    name: Enforce Anchor Policies
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Anchor-Audit
        run: |
          pip install .

      - name: Seed Governance Cache
        run: |
          mkdir -p .anchor/cache
          cp constitution.anchor .anchor/cache/constitution.anchor
          cp mitigation.anchor .anchor/cache/mitigation.anchor

      - name: Run Governance Check
        run: |
          python -m anchor check anchor/ --exclude examples --exclude tests --exclude scripts --exclude case-studies --exclude docs --exclude patterns --exclude demo --json-report --github-summary
        env:
          ANCHOR_STRICT: "true"

      - name: Generate Step Summary
        if: always()
        run: |
          if [ -f anchor-summary.md ]; then
            cat anchor-summary.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Audit Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: anchor-audit-reports
          path: |
            .anchor/anchor-report.json
            .anchor/violation_report.txt
            anchor-summary.md
