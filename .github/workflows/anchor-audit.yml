# GitHub Actions Workflow for Anchor-Audit
# Enforces FINOS AI Governance policies on every pull request

name: Anchor AI Governance Check

on:
  pull_request:
    branches: [main, develop, master] # Works with any branch name
  push:
    branches: [main, master]

jobs:
  anchor-audit:
    runs-on: ubuntu-latest
    name: Enforce Anchor Policies
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Anchor-Audit
        run: |
          pip install .

      - name: Run Governance Check
        run: |
          python -m anchor check . --exclude tests --exclude scripts --exclude docs --exclude demo
        env:
          ANCHOR_STRICT: "true"

      - name: Generate Step Summary
        if: always()
        run: |
          if [ -f .anchor/reports/governance_audit.md ]; then
            cat .anchor/reports/governance_audit.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Audit Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: anchor-audit-reports
          path: |
            .anchor/telemetry/governance_report.json
            .anchor/violations/governance_violations.txt
            .anchor/reports/governance_audit.md

      - name: Comment on PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = '.anchor/reports/governance_audit.md';
            let body = '### Anchor AI Governance Check Failed\n\nYour code violates security policies. Please review the findings below.\n\n';

            if (fs.existsSync(reportPath)) {
              const reportContent = fs.readFileSync(reportPath, 'utf8');
              body += reportContent;
            } else {
              body += 'Detailed report not found. Run `anchor check` locally to debug.';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })
